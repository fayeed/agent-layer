services:
  postgres:
    image: postgres:16-alpine
    container_name: agentlayer-postgres
    environment:
      POSTGRES_DB: agentlayer
      POSTGRES_USER: agentlayer
      POSTGRES_PASSWORD: agentlayer
    ports:
      - "5432:5432"
    volumes:
      - ./.agentlayer-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentlayer -d agentlayer"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: agentlayer-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.agentlayer-data/minio:/data
